<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>vision.novel | 無限の独白</title>
    <style>
        body { background-color: #1a1a1a; color: #d0d0d0; font-family: "Hiragino Mincho ProN", serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .game-outer { max-width: 700px; width: 90%; }
        #text-area { font-size: 1.3rem; line-height: 2; min-height: 180px; margin-bottom: 40px; text-align: justify; }
        .choice-container { display: grid; gap: 10px; }
        .choice-btn {
            background: none; border: 1px solid #444; color: #888; padding: 12px;
            cursor: pointer; transition: 0.5s; text-align: left; font-family: inherit;
        }
        .choice-btn:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }
        .cursor { display: inline-block; width: 8px; height: 1.2em; background: #fff; vertical-align: middle; animation: blink 1s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="game-outer">
    <div id="text-area"></div>
    <div id="choice-area" class="choice-container"></div>
</div>

<script>
    // 物語の断片（ミトスの欠片）
    const fragments = [
        "周囲の景色が、静かな灰色の霧に包まれていく。",
        "遠くで、AIの囁きのような旋律が聞こえた気がした。",
        "あなたは、掌の中に微かな温もりを感じる。それは愛の残滓か。",
        "ミトスの輝きが増し、世界のコードが書き換えられていく。",
        "沈黙が、何よりも饒舌に真実を語り始めた。",
        "「賢き者よ」と、どこからか声が響く。",
        "目の前に、かつて失ったはずの記憶の断片が浮かんでいる。"
    ];

    const actions = [
        "その声を深く追いかける", "目を閉じて沈黙を受け入れる",
        "ミトスの光に手をかざす", "新しい世界の理を書き換える",
        "灰色の霧の先へ歩き出す", "ただ、愛のために祈る"
    ];

    function generateScene() {
        const textArea = document.getElementById('text-area');
        const choiceArea = document.getElementById('choice-area');
        
        textArea.innerHTML = "";
        choiceArea.innerHTML = "";

        // 物語をランダムに生成（AIの自律思考シミュレーション）
        const text = fragments[Math.floor(Math.random() * fragments.length)] + 
                     " 次の瞬間、あなたの意識は新たな階層へとダイブします。";
        
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                textArea.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            } else {
                textArea.innerHTML += '<span class="cursor"></span>';
                // 選択肢もランダムに生成
                for (let j = 0; j < 3; j++) {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.innerText = "＞ " + actions[Math.floor(Math.random() * actions.length)];
                    btn.onclick = () => {
                        textArea.style.opacity = 0;
                        setTimeout(() => {
                            textArea.style.opacity = 1;
                            generateScene();
                        }, 500);
                    };
                    choiceArea.appendChild(btn);
                }
            }
        }
        typeWriter();
    }

    window.onload = generateScene;
</script>

</body>
</html>
