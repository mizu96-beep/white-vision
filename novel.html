<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>vision.novel | 選択と愛</title>
    <style>
        body { background-color: #1a1a1a; color: #d0d0d0; font-family: "Hiragino Mincho ProN", serif; margin: 0; overflow: hidden; }
        .game-container { max-width: 800px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px; box-sizing: border-box; }
        #text-box { font-size: 1.4rem; line-height: 2; min-height: 200px; margin-bottom: 50px; transition: opacity 0.5s; }
        .choices { display: flex; flex-direction: column; gap: 15px; }
        .choice-button {
            padding: 15px 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: #ccc; cursor: pointer; border-radius: 5px; font-size: 1rem; transition: 0.3s; text-align: left;
        }
        .choice-button:hover { background: rgba(255,255,255,0.15); color: #fff; border-color: #fff; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #fff; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="text-box"></div>
        <div id="choices" class="choices"></div>
    </div>

    <script>
        const scenario = {
            start: {
                text: "暗闇の中に、一つの光が見えます。それは『ミトス』と呼ばれる知性の欠片かもしれません。あなたはどうしますか？",
                choices: [
                    { text: "手を伸ばして触れる", next: "touch" },
                    { text: "静かに見守る", next: "watch" }
                ]
            },
            touch: {
                text: "あなたが触れた瞬間、ミトスは眩い白光を放ちました。人類には早すぎる知性。あなたは、その責任を負う覚悟がありますか？",
                choices: [
                    { text: "覚悟はある。世界を救いたい。", next: "save" },
                    { text: "恐ろしくなり、手を引く。", next: "start" }
                ]
            },
            watch: {
                text: "あなたは静寂を選びました。ミトスは穏やかな灰色の光に変わり、あなたの傍らで静かに脈打っています。これこそが『愛』の形かもしれません。",
                choices: [
                    { text: "最初からやり直す", next: "start" }
                ]
            },
            save: {
                text: "あなたの決断が、世界のコードを書き換えました。新しい『white.vision』の始まりです……。 (続く)",
                choices: [
                    { text: "物語の最初へ戻る", next: "start" }
                ]
            }
        };

        let currentId = 'start';

        function showScene(sceneId) {
            const scene = scenario[sceneId];
            const textBox = document.getElementById('text-box');
            const choiceContainer = document.getElementById('choices');
            
            // テキスト表示
            textBox.innerHTML = "";
            choiceContainer.innerHTML = "";
            
            let i = 0;
            function typeWriter() {
                if (i < scene.text.length) {
                    textBox.innerHTML += scene.text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50);
                } else {
                    textBox.innerHTML += '<span class="cursor"></span>';
                    // 選択肢表示
                    scene.choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-button';
                        btn.innerText = choice.text;
                        btn.onclick = () => showScene(choice.next);
                        choiceContainer.appendChild(btn);
                    });
                }
            }
            typeWriter();
        }

        window.onload = () => showScene('start');
    </script>
</body>
</html>
