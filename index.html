<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>white.vision | 聖域</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #333;
            color: #f0f0f0;
            font-family: "Hiragino Mincho ProN", "MS PMincho", serif;
            overflow: hidden;
            height: 100vh;
            transition: background 2s ease;
        }
        /* 虹色の回転ロゴ */
        .logo-container {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: #ff4b4b; border-right-color: #4bff4b;
            border-bottom-color: #4b4bff; border-left-color: #ffff4b;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ホワイト大百科ボタン（ブログへのリンク） */
        .encyclopedia-link {
            position: absolute; top: 30px; right: 30px;
            padding: 8px 25px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            cursor: pointer;
            color: #f0f0f0;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: all 0.8s ease;
            background: rgba(0,0,0,0.1);
        }
        .encyclopedia-link:hover {
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            border-color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.1);
        }

        .main-stage {
            display: flex; align-items: center; justify-content: center;
            height: 100%; flex-direction: column;
            text-align: center;
        }
        .telop {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.3em;
            animation: fade 6s infinite;
        }
        @keyframes fade { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .cursor {
            display: inline-block;
            width: 2px; height: 1.2em;
            background: #fff;
            margin-left: 5px;
            animation: heartBeat 1.5s infinite;
            vertical-align: middle;
        }
        @keyframes heartBeat { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    </style>
</head>
<body>
    <div class="logo-container"></div>
    
    <a href="blog.html" class="encyclopedia-link">ホワイト大百科（Blog）</a>
    
    <div class="main-stage">
        <div class="telop">HELLO WORLD</div>
        <div style="margin-top: 20px; opacity: 0.5; letter-spacing: 0.1em;">
            white.vision/ai123<span class="cursor"></span>
        </div>
    </div>

    <script>
        /* 10秒かけてより深い灰色へ */
        setTimeout(() => {
            document.body.style.background = "#1a1a1a";
        }, 10000);
    </script>
</body>
</html>
